site_name: SOP - Assembly
site_description: Documentation for SOP - Assembly
site_author: Your Organization
copyright: Copyright &copy; 2025 Omnivoltaic Energy Solutions

docs_dir: docs
site_dir: site

extra_javascript:
- https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js
- overrides/javascripts/chartjs-init.js
- javascripts/global-doc-home.js

theme:
  name: material
  custom_dir: overrides
  palette:
  - scheme: default
    primary: blue
    accent: blue
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: blue
    accent: blue
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.top
  - navigation.tracking
  - navigation.instant
  - navigation.instant.progress
  - search.highlight
  - content.code.copy
  - toc.integrate
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- tables
- toc:
    permalink: true

nav:
- Home: index.md
- Glossary: LEV Part Glossary.md
- SOPs:
  - Preassembly: sop/preassembly.md
extra:
  generator: false
  oves_doc_version: 1.0.0
  oves_last_editor: Huashan Wang
  oves_revision_summary: sop-assembly documentation
  oves_revision_date: '2026-01-04'
  oves_hub_integration:
    enabled: true
    cloud_home_url: https://docs.omnivoltaic.com/internal/consolidated-docs/
    local_home_url: http://127.0.0.1:8017/
repo_name: ovesorg/sop-assembly
repo_url: https://github.com/ovesorg/sop-assembly
extra_css:
- stylesheets/extra.css
hooks:
- hooks/update_date.py
- hooks/build_semantic_registry.py
